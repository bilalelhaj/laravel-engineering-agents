name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: plugin.json — valid JSON
        run: |
          jq empty .claude-plugin/plugin.json
          echo "✓ plugin.json is valid JSON"

      - name: plugin.json — required fields present
        run: |
          set -e
          for field in name version description author license agents; do
            if ! jq -e ".${field}" .claude-plugin/plugin.json > /dev/null; then
              echo "✗ plugin.json missing required field: ${field}"
              exit 1
            fi
          done
          echo "✓ plugin.json has all required fields"

      - name: agents — frontmatter has name and description
        # Tools field is intentionally not parsed: Claude Code's `Agent(...)` syntax is
        # not strict YAML, and we don't need to validate it — only that name+description
        # are extractable for routing.
        run: |
          set -e
          fail=0
          for agent in .claude/agents/*.md; do
            # Extract value of `name:` and `description:` from frontmatter only
            # (between first two --- lines), via simple line-based grep.
            fm=$(awk '/^---$/{f++; next} f==1' "$agent")
            name=$(echo "$fm" | grep -E '^name:' | head -1 | sed -E 's/^name:[[:space:]]*//; s/^"(.*)"$/\1/; s/^'"'"'(.*)'"'"'$//')
            description=$(echo "$fm" | grep -E '^description:' | head -1 | sed -E 's/^description:[[:space:]]*//')

            if [ -z "$name" ]; then
              echo "✗ $agent: missing 'name:' line in frontmatter"
              fail=1
              continue
            fi
            if [ -z "$description" ]; then
              echo "✗ $agent: missing 'description:' line in frontmatter"
              fail=1
              continue
            fi
            # Description ≥ 50 chars to be useful for delegation routing
            if [ "${#description}" -lt 50 ]; then
              echo "✗ $agent: description too short (${#description} chars, need ≥ 50)"
              fail=1
            fi
          done
          [ "$fail" = "1" ] && exit 1
          echo "✓ All agents have valid frontmatter"

      - name: agents — frontmatter name matches filename
        run: |
          set -e
          fail=0
          for agent in .claude/agents/*.md; do
            filename=$(basename "$agent" .md)
            fm=$(awk '/^---$/{f++; next} f==1' "$agent")
            name=$(echo "$fm" | grep -E '^name:' | head -1 | sed -E 's/^name:[[:space:]]*//')
            if [ "$filename" != "$name" ]; then
              echo "✗ $agent: frontmatter name '$name' does not match filename '$filename'"
              fail=1
            fi
          done
          [ "$fail" = "1" ] && exit 1
          echo "✓ All agent filenames match their frontmatter name"

      - name: README — references every agent
        run: |
          set -e
          fail=0
          for agent in .claude/agents/*.md; do
            name=$(basename "$agent" .md)
            if ! grep -q "$name" README.md; then
              echo "✗ README.md does not mention agent '$name'"
              fail=1
            fi
          done
          [ "$fail" = "1" ] && exit 1
          echo "✓ README mentions every agent"

      - name: README — internal example links resolve
        run: |
          set -e
          fail=0
          for link in $(grep -oE '\(examples/[^)]+\)' README.md | tr -d '()'); do
            if [ ! -f "$link" ]; then
              echo "✗ README links to '$link' but the file does not exist"
              fail=1
            fi
          done
          [ "$fail" = "1" ] && exit 1
          echo "✓ All README example links resolve"
