name: Repository

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent-references:
    name: Every agent is referenced in README or docs/AGENTS.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          set -e
          fail=0
          for agent in .claude/agents/*.md; do
            name=$(basename "$agent" .md)
            if ! grep -q "$name" README.md docs/AGENTS.md; then
              echo "✗ Neither README.md nor docs/AGENTS.md mentions agent '$name'"
              fail=1
            fi
          done
          [ "$fail" = "1" ] && exit 1
          echo "✓ Every agent is referenced in README or docs/AGENTS.md"

  readme-links:
    name: README internal links resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          set -e
          fail=0
          for link in $(grep -oE '\((examples|docs)/[^)]+\)' README.md | tr -d '()'); do
            if [ ! -f "$link" ]; then
              echo "✗ README links to '$link' but the file does not exist"
              fail=1
            fi
          done
          [ "$fail" = "1" ] && exit 1
          echo "✓ All README internal links resolve"

  contributing:
    name: CONTRIBUTING.md present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          test -f CONTRIBUTING.md || { echo "✗ CONTRIBUTING.md missing"; exit 1; }
          echo "✓ CONTRIBUTING.md present"
